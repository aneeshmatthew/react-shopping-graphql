name: CD — Deploy to Vercel

# Only deploys when CI passes on the main branch
# (this workflow runs AFTER ci.yml passes)
on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # ─── Vercel Deploy ────────────────────────────────────────────────────
      # To activate this step:
      # 1. Go to https://vercel.com → create a project → link your GitHub repo
      # 2. Get your tokens: vercel.com/account/tokens
      # 3. Add these 3 secrets in GitHub → Settings → Secrets → Actions:
      #      VERCEL_TOKEN      → your personal Vercel token
      #      VERCEL_ORG_ID     → found in your Vercel project settings
      #      VERCEL_PROJECT_ID → found in your Vercel project settings
      # 4. Remove the 'if: false' line below to enable deployment

      - name: Deploy to Vercel
        if: false  # ← remove this line once you have added the secrets above
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./
